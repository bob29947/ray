# GPU Ray cluster on AWS for the fused CriteoPrivateAd preprocessing benchmark.
#
# Single-GPU networked nodes (the design target): 4x g6.4xlarge, each 1x NVIDIA
# L4 (24 GB), PCIe Gen4, NO NVLink. This matches the fused, device-resident
# preprocessing path -- per-block residency (PCIe is the tax), no cross-node GPU
# shuffle. Compare against the 4x m5dn.4xlarge CPU baseline in cluster/ray-cpu.yaml.
#
# Like ray-cpu.yaml, it ships and installs the Ray WHEEL BUILT FROM THIS WORKTREE
# (mounted from ./dist) plus the RAPIDS stack (cudf/rmm/cupy) needed by the GPU
# preprocessors. Run all commands from the worktree root.
#
# Build wheel:
#   ./build-wheel.sh 3.10 ./dist
#
# Launch:
#   ray up cluster/ray-gpu.yaml -y
#
# Verify Ray + GPUs:
#   ray exec cluster/ray-gpu.yaml 'python -c "import ray; ray.init(address=\"auto\"); print(ray.cluster_resources())"'
#   ray exec cluster/ray-gpu.yaml 'python -c "from ray.data.preprocessors import _gpu; print(_gpu.gpu_available())"'
#
# GPU benchmark smoke (row-capped):
#   ray exec cluster/ray-gpu.yaml \
#     'cd /home/ray/benchmarks/criteo && python gpu_pipeline.py --days 1 --rows 100000 --data-root s3://bobbwang-ray-e2e-criteo/criteo-private-ad/data --out s3://bobbwang-ray-e2e-criteo/criteo-private-ad/outputs/gpu_smoke_days1 --ray-address auto --skip-saved-sort-verify'
#
# GPU benchmark full day (block sizes auto: Ray sizes read/sort blocks; the
# fused device batch is auto-derived from VRAM + row width + GPU count):
#   ray exec cluster/ray-gpu.yaml \
#     'cd /home/ray/benchmarks/criteo && python gpu_pipeline.py --days 1 --data-root s3://bobbwang-ray-e2e-criteo/criteo-private-ad/data --out s3://bobbwang-ray-e2e-criteo/criteo-private-ad/outputs/gpu_days1 --ray-address auto'
#
# GPU benchmark full 30-day (the tuned run; everything auto -- Ray sizes
# read/sort blocks, the fused device batch is VRAM-auto, and the fused worker
# count defaults to the cluster's 4 GPUs; this is exactly how a real user runs
# it -- no manual --blocks / --gpu-batch-size / --gpu-num-gpus). High-card columns
# are auto-detected (exact distinct scan) and hashed -- no manual config:
#   ray exec cluster/ray-gpu.yaml \
#     'cd /home/ray/benchmarks/criteo && python gpu_pipeline.py --days 1-30 --data-root s3://bobbwang-ray-e2e-criteo/criteo-private-ad/data --out s3://bobbwang-ray-e2e-criteo/criteo-private-ad/outputs/gpu_days1_30_4v4 --ray-address auto --overwrite'
#
# GPU benchmark full 30-day, WIDE feature set (keep features_not_available_* as
# features -> ~2x wider fused frame; run the CPU baseline with --feature-set wide
# too for a fair compare):
#   ray exec cluster/ray-gpu.yaml \
#     'cd /home/ray/benchmarks/criteo && python gpu_pipeline.py --days 1-30 --feature-set wide --data-root s3://bobbwang-ray-e2e-criteo/criteo-private-ad/data --out s3://bobbwang-ray-e2e-criteo/criteo-private-ad/outputs/gpu_days1_30_4v4_wide --ray-address auto --overwrite'
#
# Tear down:
#   ray down cluster/ray-gpu.yaml -y

cluster_name: ray-gpu-e2e-bobbwang

# Cluster size: TRUE 4v4 -- 1 head + 3 GPU workers = 4 fused L4 GPUs, ALL
# nodes run tasks (no dedicated coordinator head). The head is a full worker:
# it advertises its detected {CPU:16, GPU:1} and runs read/sort/fused tasks like
# the 3 workers. This is safe now that the high-cardinality columns are HASHED in
# the shared prep stage (criteo.hash_indices): the OrdinalEncoder vocab is bounded
# (max ~270k vs the old 8.8M/12.2M dense vocab), so the driver-side fused-fit
# merge is small and no longer needs a 64 GiB node to itself -- the coordinator
# head + CPU concurrency-cap workaround is removed. Matched 1:1 against the CPU
# cluster (cluster/ray-cpu.yaml, also 1 head + 3 workers, all running tasks). The
# fused worker count auto-defaults to the cluster GPU total (4). For X total GPU
# nodes set top-level max_workers and the worker min/max_workers all to X-1.
max_workers: 3

upscaling_speed: 1.0

# GPU Docker image + NVIDIA runtime. Requires the HOST to have NVIDIA drivers and
# the nvidia-container-toolkit (see initialization_commands); the g6 instances
# below use a GPU-driver AMI so the container can see the L4 via `--gpus all`.
docker:
    image: "rayproject/ray:nightly-py310-gpu"
    container_name: "ray_container"
    pull_before_run: True
    run_options:
        - --gpus all
        - --shm-size=32gb
        - --ulimit nofile=65536:65536

idle_timeout_minutes: 60

provider:
    type: aws
    region: us-west-2
    availability_zone: us-west-2a,us-west-2b
    cache_stopped_nodes: False

auth:
    ssh_user: ubuntu

available_node_types:
    ray.head.default:
        # FULL WORKER (true 4v4): empty `resources` lets Autoscaler v2 inject the
        # detected {"CPU":16,"GPU":1}, so the head schedules read/sort tasks and a
        # fused GPU actor exactly like the 3 workers -- 1 head + 3 workers = 4
        # fused L4 GPUs. The old dedicated-coordinator override ({"CPU":0,"GPU":0})
        # is removed: with high-card columns now hashed in prep, the driver-side
        # fused-fit vocab merge is small (bounded vocab), so the head no longer
        # needs its 64 GiB reserved.
        resources: {}
        node_config:
            InstanceType: g6.4xlarge
            # GPU AMI with NVIDIA drivers + Docker + nvidia-container-toolkit
            # preinstalled: "Deep Learning Base OSS Nvidia Driver GPU AMI
            # (Ubuntu 22.04) 20260609" in us-west-2. REQUIRED for g6 L4 nodes:
            # the plain Ray AMI has no GPU driver, so `--gpus all` fails with
            # `libnvidia-ml.so.1: cannot open shared object file`.
            ImageId: ami-0784c1a0dc19c0265
            IamInstanceProfile:
                Arn: arn:aws:iam::503960270539:instance-profile/ray-autoscaler-v1
            # L4 nodes process ~3 GB of resident cuDF per block; 500 GiB gp3 gives
            # headroom for the read materialization + sort shuffle spill. Raise
            # (VolumeSize/Iops/Throughput) for full 30-day runs.
            BlockDeviceMappings:
                - DeviceName: /dev/sda1
                  Ebs:
                      VolumeSize: 1000
                      VolumeType: gp3
                      Iops: 16000
                      Throughput: 1000
            TagSpecifications:
                - ResourceType: instance
                  Tags:
                      - { Key: Owner,   Value: bobbwang }
                      - { Key: User,    Value: bobbwang }
                      - { Key: Project, Value: ray-e2e }
                      - { Key: Purpose, Value: gpu-tests-and-benchmarks }
                      - { Key: Cluster, Value: ray-gpu-e2e-bobbwang }
                - ResourceType: volume
                  Tags:
                      - { Key: Owner,   Value: bobbwang }
                      - { Key: User,    Value: bobbwang }
                      - { Key: Project, Value: ray-e2e }
                      - { Key: Purpose, Value: gpu-tests-and-benchmarks }
                      - { Key: Cluster, Value: ray-gpu-e2e-bobbwang }
    ray.worker.default:
        # Keep exactly 3 workers (4 total GPU nodes = 4 L4s). See top-level max_workers.
        min_workers: 3
        max_workers: 3
        resources: {}
        node_config:
            InstanceType: g6.4xlarge
            ImageId: ami-0784c1a0dc19c0265
            IamInstanceProfile:
                Arn: arn:aws:iam::503960270539:instance-profile/ray-autoscaler-v1
            BlockDeviceMappings:
                - DeviceName: /dev/sda1
                  Ebs:
                      VolumeSize: 1000
                      VolumeType: gp3
                      Iops: 16000
                      Throughput: 1000
            TagSpecifications:
                - ResourceType: instance
                  Tags:
                      - { Key: Owner,   Value: bobbwang }
                      - { Key: User,    Value: bobbwang }
                      - { Key: Project, Value: ray-e2e }
                      - { Key: Purpose, Value: gpu-tests-and-benchmarks }
                      - { Key: Cluster, Value: ray-gpu-e2e-bobbwang }
                - ResourceType: volume
                  Tags:
                      - { Key: Owner,   Value: bobbwang }
                      - { Key: User,    Value: bobbwang }
                      - { Key: Project, Value: ray-e2e }
                      - { Key: Purpose, Value: gpu-tests-and-benchmarks }
                      - { Key: Cluster, Value: ray-gpu-e2e-bobbwang }

head_node_type: ray.head.default

# Mount the built wheel, the benchmarks, and the current GPU preprocessor
# sources (overlaid over the installed wheel in setup_commands, so the cluster
# runs the exact fused code in this worktree even though it is not yet in the
# pinned wheel). NOT the full Ray source tree.
file_mounts: {
    "/home/ray/ray_wheels": "dist",
    "/home/ray/benchmarks": "benchmarks",
    "/home/ray/preproc_overlay": "python/ray/data/preprocessors",
    # The saved-output order fix lives in a core file (the Parquet datasink),
    # not the preprocessors, so overlay it too (until it lands in the wheel).
    "/home/ray/parquet_datasink_overlay.py": "python/ray/data/_internal/datasource/parquet_datasink.py",
}

rsync_exclude:
    - "**/.git"
    - "**/.git/**"
    - "**/__pycache__"
    - "**/__pycache__/**"
    - "**/*.pyc"
    - "**/criteo/data"
    - "**/criteo/data/**"

# Install Docker + the NVIDIA container toolkit (outside the container) if the
# host AMI doesn't already have them, so `--gpus all` works.
initialization_commands:
    - |
       if ! docker --version; then
         curl -fsSL https://get.docker.com -o get-docker.sh
         sudo sh get-docker.sh
         sudo usermod -aG docker $USER
         sudo systemctl restart docker -f
       fi
    - |
       if ! docker info 2>/dev/null | grep -qi nvidia; then
         distribution=$(. /etc/os-release; echo $ID$VERSION_ID)
         curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg || true
         curl -fsSL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list || true
         sudo apt-get update && sudo apt-get install -y nvidia-container-toolkit || true
         sudo nvidia-ctk runtime configure --runtime=docker || true
         sudo systemctl restart docker || true
       fi

# Install the locally-built Ray wheel, then the benchmark deps AND the RAPIDS
# stack (cudf/rmm/cupy for CUDA 12) the GPU preprocessors require.
setup_commands:
    - python -m pip uninstall -y ray || true
    - WHEEL=$(ls /home/ray/ray_wheels/ray-*.whl | head -n1); python -m pip install -U "ray[default] @ file://$WHEEL"
    - python -m pip install -U numpy pandas pyarrow scipy s3fs fsspec pytest fire
    - python -m pip install -U --extra-index-url https://pypi.nvidia.com "cudf-cu12" "rmm-cu12" "cupy-cuda12x"
    # Overlay the current GPU preprocessor sources over the installed wheel so
    # the cluster runs this worktree's fused impute+encode+scale code.
    - DST=$(python -c "import ray.data.preprocessors as p, os; print(os.path.dirname(p.__file__))"); echo "overlay into $DST"; cp -f /home/ray/preproc_overlay/*.py "$DST/"; python -c "import ray.data.preprocessors._gpu_fused as f; from ray.data.preprocessors import Chain; print('overlay ok fused module present')"
    # Overlay the patched Parquet datasink (saved-output row-order preservation).
    - DST=$(python -c "import ray.data._internal.datasource.parquet_datasink as p, os; print(os.path.dirname(p.__file__))"); echo "datasink overlay into $DST"; cp -f /home/ray/parquet_datasink_overlay.py "$DST/parquet_datasink.py"; python -c "import ray.data._internal.datasource.parquet_datasink as p; src=open(p.__file__).read(); assert 'combine_chunks' in src and 'preserve_order' in src, 'datasink order fix missing'; print('datasink overlay ok')"

head_setup_commands: []
worker_setup_commands: []

# The head is a FULL WORKER (true 4v4): NO --num-cpus=0 / --num-gpus=0, so it
# advertises its detected 16 CPU + 1 L4 and runs read/sort tasks and a fused GPU
# actor like the 3 workers. The dedicated-coordinator workaround is gone because
# the high-cardinality columns are now hashed in the shared prep stage, so the
# driver-side fused-fit vocab merge is small (bounded OrdinalEncoder vocab,
# max ~270k) instead of the old ~38 GiB merge of the 8.8M/12.2M dense vocabs that
# forced the head to sit idle. --object-store-memory: 10 GiB on every node
# (head matched to workers) so the 30-day read+sort working set spills to the
# 1 TB gp3 disk instead of pinning RAM.
head_start_ray_commands:
    - ray stop
    - ray start --head --port=6379 --object-manager-port=8076 --object-store-memory=10000000000 --autoscaling-config=~/ray_bootstrap_config.yaml --dashboard-host=0.0.0.0

worker_start_ray_commands:
    - ray stop
    - ray start --address=$RAY_HEAD_IP:6379 --object-manager-port=8076 --object-store-memory=10000000000
